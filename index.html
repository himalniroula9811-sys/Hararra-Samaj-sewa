<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hararra Samaj Sewa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #fdfaf1;
            --header-text: #064e3b;
            --card-green: #dcf1d8;
            --accent-coral: #f88379;
            --esewa-green: #1a7b32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-cream); font-family: 'Poppins', sans-serif; color: #333; }

        /* Navbar */
        nav {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links li a { text-decoration: none; color: #777; font-size: 0.9rem; }
        .nav-links li a.active { color: var(--accent-coral); border-bottom: 2px solid var(--accent-coral); }

        /* Main Heading */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--header-text);
            text-align: center;
            margin: 50px 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 30px;
            color: #1a2e28;
        }

        section { max-width: 1000px; margin: 0 auto 60px; padding: 0 20px; }

        /* Committee Cards */
        .committee-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .member-card {
            background: var(--card-green);
            flex: 1;
            min-width: 250px;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
        }
        .avatar {
            width: 90px;
            height: 90px;
            background: #0d4d42;
            border-radius: 50%;
            margin: 0 auto 20px;
        }
        .member-card h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .member-card p { color: #888; font-size: 0.9rem; }

        /* Donation Section */
        .donation-box {
            background-color: var(--accent-coral);
            padding: 50px 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            position: relative;
        }
        .badge {
            background: var(--esewa-green);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        .phone {
            font-size: 3.2rem;
            font-weight: 700;
            display: block;
            margin: 10px 0;
            color: #064e3b;
        }
        .registered { font-size: 1.1rem; margin-bottom: 25px; opacity: 0.9; }
        .registered strong { color: #064e3b; }

        .form-btn {
            background: #d1d5db;
            color: black;
            padding: 12px 60px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }

        /* Mockup Desktop Image (Bottom Decoration) */
        .desktop-mockup {
            width: 100%;
            max-width: 800px;
            margin: -40px auto 0;
            display: block;
        }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: bold;">👤</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Executive Committee</a></li>
            <li><a href="#">Donations</a></li>
            <li><a href="#" class="active">Contact</a></li>
        </ul>
    </nav>

    <h1 class="main-title">Hararra Samaj Sewa</h1>

    <section>
        <h2 class="section-title">Executive Committee</h2>
        <div class="committee-container">
            <div class="member-card">
                <div class="avatar"></div>
                <h3>Himal Niroula</h3>
                <p>President</p>
            </div>
            <div class="member-card">
                <div class="avatar"></div>
                <h3>Deepu kumar yadav</h3>
                <p>Secretary</p>
            </div>
            <div class="member-card">
                <div class="avatar"></div>
                <h3>Salon kharal</h3>
                <p>Treasurer</p>
            </div>
        </div>
    </section>

    <section>
        <h2 class="section-title">Donation Collection</h2>
        <div class="donation-box">
            <div class="badge">eSewa / Khalti / Fonepay</div>
            <span class="phone">9818760875</span>
            <p class="registered">Registered to: <strong>Salon kharal</strong></p>
            <a href="#" class="form-btn">Donation Form</a>
        </div>
    </section>

</body>
</html>
