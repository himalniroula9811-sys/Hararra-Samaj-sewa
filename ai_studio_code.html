    <style>
        /* 
        --- DESIGN SYSTEM ---
        */
        :root {
            --primary: #0F6F5C;       /* Deep Green */
            --secondary: #3A86FF;     /* Soft Blue */
            --accent: #FF7A00;        /* Warm Orange */
            --bg-light: #F9FAFB;      /* Off-white */
            --text-dark: #1F2933;     /* Dark Charcoal */
            --text-muted: #4B5563;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; font-weight: 800; line-height: 1.2; }
        a { text-decoration: none; color: inherit; transition: var(--transition); }
        ul { list-style: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .section-padding { padding: 100px 0; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        /* 
        --- NAVIGATION ---
        */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 0;
            z-index: 1000;
            transition: var(--transition);
        }
        header.scrolled {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            box-shadow: var(--shadow);
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; color: var(--primary); font-weight: 800; letter-spacing: -1px; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a:hover { color: var(--primary); }
        .donate-cta { background: var(--accent); color: var(--white); box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3); }
        .donate-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 122, 0, 0.4); }

        /* 
        --- HERO SECTION ---
        */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            color: var(--white);
            background: linear-gradient(rgba(15, 111, 92, 0.7), rgba(31, 41, 51, 0.8)), 
                        url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            text-align: center;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(15, 111, 92, 0.2) 0%, transparent 100%);
            animation: gradientShift 8s infinite alternate;
        }
        @keyframes gradientShift { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .hero-content { position: relative; z-index: 2; max-width: 850px; margin: 0 auto; padding: 0 20px; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4.2rem); margin-bottom: 24px; animation: fadeInUp 1s ease; }
        .hero p { font-size: 1.2rem; margin-bottom: 40px; opacity: 0.9; animation: fadeInUp 1.2s ease; }
        .hero-btns { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; animation: fadeInUp 1.4s ease; }
        .btn-outline { background: transparent; border: 2px solid var(--white); color: var(--white); }
        .btn-outline:hover { background: var(--white); color: var(--primary); }

        /* 
        --- TRUST BAR ---
        */
        .trust-bar {
            background: var(--white);
            padding: 40px 0;
            margin-top: -60px;
            position: relative;
            z-index: 10;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .trust-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; text-align: center; }
        .trust-item i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .trust-item h4 { font-size: 1.1rem; color: var(--text-dark); }
